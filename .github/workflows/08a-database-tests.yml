name: 08A Database Tests

on:
  pull_request:
    paths:
      - "supabase/**"
      - "scripts/collab/**"
      - "scripts/admin/**"
      - ".github/workflows/08a-database-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase start
      - run: supabase db reset
      - name: Test collaborative foundation
        run: |
          psql postgresql://postgres:postgres@127.0.0.1:54322/postgres             -v ON_ERROR_STOP=1             -f supabase/collab-tests/008a_collaborative_foundation.test.sql
      - if: always()
        run: supabase stop --no-backup
