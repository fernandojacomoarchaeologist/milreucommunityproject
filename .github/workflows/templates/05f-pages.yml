name: Pages Template

# Copiar e adaptar apenas depois de confirmar o build existente.
# Este template não é ativado automaticamente.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run infra:validate
      - run: npm run build
