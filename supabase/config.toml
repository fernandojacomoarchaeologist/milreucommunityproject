project_id = "milreu-proteus-local"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public", "proteus_poc"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "25MiB"

[auth]
enabled = true
site_url = "http://localhost:4173/"
additional_redirect_urls = [
  "http://localhost:4173/auth/callback/",
  "http://127.0.0.1:4173/auth/callback/"
]
jwt_expiry = 3600
enable_signup = true
